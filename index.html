<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meridian</title>
  <style>
    :root {
      --ground:       #F4F6FA;
      --text:         #0E1923;
      --accent:       #1A5FA8;
      --accent-muted: #8AAACE;
      --grid-line:    rgba(26, 95, 168, 0.07);
      --secondary:    #5A6880;
      --rule:         #C8D0DC;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--ground);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 60px 60px;
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .clock { text-align: center; width: 100%; }

    /* ── shared components ── */
    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }
    .section-label::before, .section-label::after {
      content: '';
      width: 36px;
      height: 1px;
      background: var(--rule);
      display: block;
    }

    .rule {
      display: flex;
      align-items: center;
      width: min(500px, 82vw);
      margin: 2.75rem auto;
    }
    .rule-line { flex: 1; height: 1px; background: var(--rule); }
    .rule-diamond {
      width: 7px;
      height: 7px;
      border: 1.5px solid var(--accent-muted);
      background: var(--ground);
      transform: rotate(45deg);
      flex-shrink: 0;
      margin: 0 0.9rem;
    }

    /* ── main time ── */
    .section-label.main { margin-bottom: 2.75rem; }

    .time-display {
      font-size: clamp(3.5rem, 15vw, 12.5rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .colon {
      color: var(--accent);
      display: inline-block;
      position: relative;
      top: -0.04em;
      transition: opacity 0.07s linear;
    }

    .ms-block {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
    }
    .ms-display {
      font-size: clamp(1.6rem, 4.5vw, 3.25rem);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.12em;
      color: var(--accent);
      line-height: 1;
    }
    .ms-label {
      font-size: 0.5rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--accent-muted);
    }

    /* ── date row ── */
    .date-row {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .date-field {
      text-align: center;
      padding: 0 clamp(1rem, 3vw, 2.25rem);
    }
    .date-value {
      font-size: clamp(0.7rem, 1.8vw, 0.95rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .date-key {
      font-size: 0.48rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--secondary);
      margin-top: 0.45rem;
    }
    .date-sep { width: 1px; height: 30px; background: var(--rule); flex-shrink: 0; }

    /* ── world clock panel ── */
    .world-section { margin-top: 0; }

    .section-label.world { margin-bottom: 2rem; }

    .world-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: min(640px, 92vw);
      margin: 0 auto;
    }

    .zone-card {
      text-align: center;
      padding: 0 0.75rem 0.25rem;
    }
    .zone-card + .zone-card { border-left: 1px solid var(--rule); }

    .zone-city {
      font-size: 0.5rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 0.6rem;
      white-space: nowrap;
    }

    .zone-time-wrap {
      position: relative;
      display: inline-block;
      line-height: 1;
    }
    .zone-time {
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .zone-day-badge {
      position: absolute;
      top: -0.45em;
      right: -1.5em;
      font-size: 0.42rem;
      letter-spacing: 0.05em;
      color: var(--accent);
      font-weight: 400;
    }

    .zone-offset {
      font-size: 0.46rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent-muted);
      margin-top: 0.5rem;
    }

    @media (max-width: 420px) {
      .world-grid { grid-template-columns: repeat(2, 1fr); row-gap: 1.75rem; }
      .zone-card:nth-child(odd) { border-left: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .colon { transition: none; opacity: 1 !important; }
    }
  </style>
</head>
<body>
  <main class="clock" role="timer" aria-label="Current local time">

    <div class="section-label main" aria-hidden="true">Meridian &nbsp;·&nbsp; Local Time</div>

    <div class="time-display" aria-hidden="true">
      <span id="hh">00</span><span class="colon">:</span><span id="mm">00</span><span class="colon">:</span><span id="ss">00</span>
    </div>

    <div class="ms-block" aria-hidden="true">
      <div class="ms-display"><span id="ms">000</span></div>
      <div class="ms-label">milliseconds</div>
    </div>

    <div class="rule" aria-hidden="true">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>

    <div class="date-row" aria-hidden="true">
      <div class="date-field">
        <div class="date-value" id="day-name">—</div>
        <div class="date-key">Day</div>
      </div>
      <div class="date-sep"></div>
      <div class="date-field">
        <div class="date-value" id="date-str">—</div>
        <div class="date-key">Date</div>
      </div>
      <div class="date-sep"></div>
      <div class="date-field">
        <div class="date-value" id="tz">—</div>
        <div class="date-key">Zone</div>
      </div>
    </div>

    <div class="rule" aria-hidden="true">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>

    <div class="world-section" aria-label="World clocks">
      <div class="section-label world" aria-hidden="true">World</div>
      <div class="world-grid" id="world-grid"></div>
    </div>

  </main>
  <script>
    function pad(n, len) { return String(n).padStart(len || 2, '0'); }

    const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const colons = document.querySelectorAll('.colon');

    // Local timezone label — set once
    const tzRaw = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Local';
    document.getElementById('tz').textContent = tzRaw.split('/').pop().replace(/_/g, ' ');

    // ── World clocks ───────────────────────────────────────────
    const ZONES = [
      { city: 'New York', tz: 'America/New_York' },
      { city: 'London',   tz: 'Europe/London'    },
      { city: 'Dubai',    tz: 'Asia/Dubai'        },
      { city: 'Tokyo',    tz: 'Asia/Tokyo'        },
    ];

    const worldGrid = document.getElementById('world-grid');
    ZONES.forEach((z, i) => {
      const card = document.createElement('div');
      card.className = 'zone-card';
      card.innerHTML =
        '<div class="zone-city">' + z.city + '</div>' +
        '<div class="zone-time-wrap">' +
          '<span class="zone-time" id="zt-' + i + '">--:--</span>' +
          '<span class="zone-day-badge" id="zd-' + i + '"></span>' +
        '</div>' +
        '<div class="zone-offset" id="zo-' + i + '">—</div>';
      worldGrid.appendChild(card);
    });

    // Formatters — built once, reused every tick
    const timeFmts = ZONES.map(z => new Intl.DateTimeFormat('en', {
      timeZone: z.tz, hour: '2-digit', minute: '2-digit', hour12: false,
    }));
    const dateFmts = ZONES.map(z => new Intl.DateTimeFormat('en-CA', {
      timeZone: z.tz, year: 'numeric', month: '2-digit', day: '2-digit',
    }));
    const offsetFmts = ZONES.map(z => new Intl.DateTimeFormat('en', {
      timeZone: z.tz, timeZoneName: 'shortOffset',
    }));
    const localDateFmt = new Intl.DateTimeFormat('en-CA');

    // UTC offsets — set once on load (DST changes twice a year, negligible)
    ZONES.forEach((z, i) => {
      const parts = offsetFmts[i].formatToParts(new Date());
      const part  = parts.find(p => p.type === 'timeZoneName');
      if (part) document.getElementById('zo-' + i).textContent =
        part.value.replace('GMT', 'UTC');
    });
    // ──────────────────────────────────────────────────────────

    let prevSec = -1;

    function tick() {
      const now = new Date();
      const ms  = now.getMilliseconds();
      const s   = now.getSeconds();

      // Main display — every frame
      document.getElementById('hh').textContent = pad(now.getHours());
      document.getElementById('mm').textContent = pad(now.getMinutes());
      document.getElementById('ss').textContent = pad(s);
      document.getElementById('ms').textContent = pad(ms, 3);

      // Colons blink in sync with second boundary
      const off = ms >= 500;
      colons.forEach(c => c.style.opacity = off ? '0.14' : '1');

      // Per-second updates
      if (s !== prevSec) {
        prevSec = s;

        // Local date — only changes at midnight
        if (s === 0 || document.getElementById('day-name').textContent === '—') {
          document.getElementById('day-name').textContent = DAYS[now.getDay()];
          document.getElementById('date-str').textContent =
            pad(now.getDate()) + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
        }

        // World clocks
        const localDate = localDateFmt.format(now);
        ZONES.forEach((z, i) => {
          document.getElementById('zt-' + i).textContent = timeFmts[i].format(now);
          const zoneDate = dateFmts[i].format(now);
          const badge    = document.getElementById('zd-' + i);
          if (zoneDate !== localDate) {
            badge.textContent = new Date(zoneDate) > new Date(localDate) ? '+1' : '-1';
          } else {
            badge.textContent = '';
          }
        });
      }

      requestAnimationFrame(tick);
    }

    tick();
  </script>
</body>
</html>
